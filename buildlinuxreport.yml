---
- name: Create Linux Report
  hosts: all
  tasks:
  
    - name: Scan packages (Unix/Linux)
      ansible.builtin.package_facts:
      register: result
      when: ansible_os_family != "Windows"

    - name: Organize results for loopings
      ansible.builtin.set_fact:
        packagefacts: "{{ result.ansible_facts.packages | dict2items }}"
        cacheable: true
      when: ansible_os_family != "Windows"

    - name: Scan services (Unix/Linux)
      ansible.builtin.service_facts:
      when: ansible_os_family != "Windows"

    - name: Build the report
      ansible.builtin.include_role:
        name: shadowman.reports/roles/build_report_linux
        apply:
          delegate_to: "{{ groups['report_server'][0] }}"
          run_once: true

    - name: Send notification to Mattermost 🚀
      ansible.builtin.uri:
        url: "{{ mattermost_webhook_url }}"
        method: POST
        body_format: json
        body:
          attachments:
            - color: "#00c853"
              title: "✅ Linux Report generado"
              fields:
                - title: "📦 Job"
                  value: "{{ tower_job_template_name }}"
                  short: true
                - title: "🖥️ Hosts"
                  value: "{{ ansible_play_hosts | length }}"
                  short: true
                - title: "👤 Ejecutado por"
                  value: "{{ tower_user_name }}"
                  short: true
                - title: "🔢 Job ID"
                  value: "{{ tower_job_id }}"
                  short: true
              text: |
                🔗 **Ver ejecución:**
                {{ tower_job_url }}

                📄 **Reporte generado en:**
                http://report-server/linux_report.html
      delegate_to: localhost
      run_once: true
